# Overlay for the nightly-arm64 boot smoke: don't publish web's 80/443 even
# inside the dind daemon — nightly-e2e's dev stack may hold them if the two
# nightlies overlap. The smoke only needs the app healthcheck + docker exec.
services:
  web:
    ports: !reset []
  # Redis's arm64-only kernel-CoW-bug probe false-positives under qemu and
  # exits — suppress for the emulated smoke (real ARM hardware passes it).
  cache:
    command: ["redis-server", "--ignore-warnings", "ARM64-COW-BUG"]
